<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000">

  <!-- Background -->
  <rect width="3000" height="2000" fill="#1e1e1e"/>

  <!-- Grid pattern to visualize scaling -->
  <g stroke="#444" stroke-width="2">
    <!-- vertical lines -->
    <line x1="500" y1="0" x2="500" y2="2000"/>
    <line x1="1000" y1="0" x2="1000" y2="2000"/>
    <line x1="1500" y1="0" x2="1500" y2="2000"/>
    <line x1="2000" y1="0" x2="2000" y2="2000"/>
    <line x1="2500" y1="0" x2="2500" y2="2000"/>

    <!-- horizontal lines -->
    <line x1="0" y1="500" x2="3000" y2="500"/>
    <line x1="0" y1="1000" x2="3000" y2="1000"/>
    <line x1="0" y1="1500" x2="3000" y2="1500"/>
  </g>

  <!-- Big central circle -->
  <circle cx="1500" cy="1000" r="400" fill="orange" opacity="0.8"/>

  <!-- Text label -->
  <text x="1500" y="1020" font-size="80" fill="white" text-anchor="middle">
    SVG SCALE TEST
  </text>

  <!-- Corner shapes -->
  <rect x="100" y="100" width="300" height="300" fill="red"/>
  <rect x="2600" y="100" width="300" height="300" fill="blue"/>
  <rect x="100" y="1600" width="300" height="300" fill="green"/>
  <rect x="2600" y="1600" width="300" height="300" fill="purple"/>

</svg>
